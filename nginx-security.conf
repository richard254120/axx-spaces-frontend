# nginx-security.conf
# Place this in: /etc/nginx/conf.d/security.conf

# Rate Limiting Zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Bad Bot Blocking
map $http_user_agent $bad_bot {
    default 0;
    ~*sqlmap|nikto|nessus|masscan|nmap|dirbuster|dirb|hydra|metasploit|burpsuite|zgrab|python-requests|go-http-client|libwww-perl|curl|wget 1;
    "" 1;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name axx-spaces.com www.axx-spaces.com;   # ← CHANGE TO YOUR DOMAIN

    ssl_certificate /etc/letsencrypt/live/axx-spaces.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/axx-spaces.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    server_tokens off;

    client_max_body_size 15m;

    # Block Bad Bots
    if ($bad_bot) {
        return 403;
    }

    # Block dangerous paths
    location ~* (\.php|\.env|\.git|\.htaccess|wp-login|xmlrpc\.php) {
        return 404;
    }

    # General API
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:1000;
        include /etc/nginx/conf.d/proxy-params.conf;
    }

    # Frontend
    location / {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://127.0.0.1:1000;
        include /etc/nginx/conf.d/proxy-params.conf;
        try_files $uri $uri/ /index.html;
    }
}

# HTTP to HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name axx-spaces.com www.axx-spaces.com;
    return 301 https://$host$request_uri;
}
