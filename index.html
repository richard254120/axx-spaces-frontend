<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>axx-spaces-frontend</title>

    <!-- Stronger Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- Strong Content Security Policy (CSP) -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'nonce-123456789';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: https: blob:;
      font-src 'self' data: https:;
      connect-src 'self' https://your-backend-domain.com wss://your-backend-domain.com;
      object-src 'none';
      base-uri 'self';
      frame-ancestors 'none';
      form-action 'self';
      upgrade-insecure-requests;
      block-all-mixed-content;
    " />
  </head>
  <body>
    <div id="root"></div>
    <!-- Add nonce to your main script -->
    <script type="module" src="/src/main.jsx" nonce="123456789"></script>
  </body>
</html>
